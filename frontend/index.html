<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TripSplit · MERN Expense Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container" id="appContainer">
  <div id="tripListView" class="card">
    <div class="trips-header">
      <h2><i class="fas fa-umbrella-beach"></i> My Trips</h2>
      <div style="display: flex; gap: 0.5rem;">
        <button id="exportAllBtn" class="btn-icon"><i class="fas fa-download"></i> Export All</button>
        <button id="importBtn" class="btn-icon"><i class="fas fa-upload"></i> Import</button>
        <button id="newTripBtn"><i class="fas fa-plus-circle"></i> New Trip</button>
      </div>
    </div>
    <div id="tripsGrid" class="trips-grid"></div>
  </div>

  <div id="tripDetailView" style="display: none;">
    <div class="card">
      <div class="back-bar">
        <button id="backToTripsBtn" class="back-btn"><i class="fas fa-arrow-left"></i> All Trips</button>
        <h2><i class="fas fa-map-marked-alt"></i> <span id="detailTripName"></span></h2>
        <button id="exportTripBtn" class="btn-icon"><i class="fas fa-download"></i> Export Trip</button>
      </div>

      <div style="margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
        <div><i class="fas fa-calendar-alt"></i> <strong>Trip Date:</strong> <span id="tripDateDisplay"></span></div>
        <button id="editTripDateBtn" class="btn-icon" style="background:#e2e8f0;"><i class="fas fa-edit"></i> Edit Date</button>
      </div>

      <div>
        <h3><i class="fas fa-users"></i> Members</h3>
        <div class="member-input-group">
          <input type="text" id="memberNameInput" placeholder="Member Name">
          <button id="addMemberBtn"><i class="fas fa-user-plus"></i> Add</button>
        </div>
        <div id="membersListContainer" class="members-chip-container"></div>
      </div>

      <div>
        <h3><i class="fas fa-camera"></i> Trip Photos</h3>
        <div style="display: flex; gap:0.6rem; flex-wrap:wrap; align-items:center;">
          <input type="file" id="photoInput" accept="image/*" multiple style="flex:2;">
          <button id="uploadPhotoBtn"><i class="fas fa-upload"></i> Add Photos (up to 50)</button>
        </div>
        <div id="photoGallery" class="photo-gallery"></div>
      </div>

      <div class="dashboard-grid">
        <div>
          <h3><i class="fas fa-receipt"></i> Expenses</h3>
          <div class="add-expense-form">
            <input type="text" id="expenseName" placeholder="Expense Name">
            <select id="expensePaidBy"></select>
            <input type="number" id="expenseAmount" placeholder="Amount (₹)">
            <button id="addExpenseBtn"><i class="fas fa-plus-circle"></i> Add</button>
          </div>
          <table>
            <thead><tr><th>Expense</th><th>Paid By</th><th>Amount</th><th>Action</th></tr></thead>
            <tbody id="expenseListBody"></tbody>
          </table>
        </div>
        <div>
          <h3><i class="fas fa-hand-holding-usd"></i> Settlement</h3>
          <div id="settlementContainer"></div>
          <button id="shareWhatsappBtn" class="share-whatsapp-btn"><i class="fab fa-whatsapp"></i> Share Settlement on WhatsApp</button>
        </div>
      </div>
    </div>
  </div>
  <input type="file" id="importFileInput" accept=".json" style="display: none;">
</div>
<script src="script.js"></script>
</body>
</html>
